<!DOCTYPE html>
<html>
<head>
    <title>Welcome to NehaCaterPro🥂</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="container">
    <h2>📅Book Your Event🥂</h2>

    <form id="bookingForm">

        <div class="form-row">

            <label>Select Event:</label>
            <select id="eventType">
 <option value="" disabled selected>Select </option>
 <option value="Marriage">💍 Marriage</option>
<option value="Birthday">🎂 Birthday</option>
<option value="Engagement">💐 Engagement</option>
<option value="Reception">🥂 Reception</option>
<option value="Anniversary">❤️ Anniversary</option>
<option value="Housewarming">🏡 Housewarming</option>
<option value="Corporate Event">🏢 Corporate Event</option>
<option value="Baby Shower">👶 Baby Shower</option>
<option value="Festival Party">🎉 Festival Party</option>
</select>

            <label>Food Type:</label>
            <select id="foodType">
<option value="" disabled selected>Select </option>
<option value="Veg">🥗 Veg - ₹300 per plate</option>
<option value="NonVeg">🍗 Non-Veg - ₹500 per plate</option>
<option value="Vegan">🌱 Vegan - ₹350 per plate</option>
<option value="Jain">🧀 Jain Food - ₹320 per plate</option>
<option value="SouthIndian">🍛 South Indian Menu - ₹400 per plate</option>
<option value="NorthIndian">🫓 North Indian Menu - ₹420 per plate</option>
<option value="Korean">🍲 Korean Menu - ₹500 per plate</option>
<option value="MultiCuisine">🍱 Multi-Cuisine Buffet - ₹600 per plate</option>
<option value="Chinese">🍜 Chinese Menu-450 per plate</option>
</select>

            <label>Quantity (plates):</label>
            <input type="number" id="quantity" min="1" required>

        </div>

        <h3 id="totalPrice">Total: ₹0</h3>

        <button type="submit">Confirm Booking</button>

    </form>
</div>


<script src="js/script.js"></script>

<script>

/* LOGIN PROTECTION */
if(!localStorage.getItem("userEmail")){
    window.location.href = "login.html";
}

/* LOGOUT FUNCTION */
function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

</script>

</body>
</html>
