<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="container">

<h2>📋 All Bookings</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>ID</th>
<th>User Email</th>
<th>Event</th>
<th>Food</th>
<th>Quantity</th>
<th>Total Price</th>
</tr>
</thead>

<tbody id="bookingTable">

</tbody>

</table>

</div>

<script>

/* LOGOUT */

function logout(){
localStorage.clear();
window.location.href = "index.html";
}


/* LOAD BOOKINGS */

async function loadBookings(){

try{

const response = await fetch("/bookings");
const bookings = await response.json();

const table = document.getElementById("bookingTable");

table.innerHTML = "";

bookings.forEach(b => {

const row = `
<tr>
<td>${b.id}</td>
<td>${b.user_email}</td>
<td>${b.event_type}</td>
<td>${b.food_type}</td>
<td>${b.quantity}</td>
<td>₹${b.total_price}</td>
</tr>
`;

table.innerHTML += row;

});

}
catch(error){

console.log(error);
alert("Failed to load bookings");

}

}

loadBookings();

</script>

</body>
</html>
